apiVersion: v1
kind: ConfigMap
metadata:
  name: transparenz-go-config
  namespace: transparenz-go
  labels:
    app.kubernetes.io/name: transparenz-go
data:
  LOG_LEVEL: "info"
  OUTPUT_FORMAT: "json"
  ENABLE_GRYPE: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transparenz-go
  namespace: transparenz-go
  labels:
    app.kubernetes.io/name: transparenz-go
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: transparenz-go
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transparenz-go
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: transparenz-go
          image: ghcr.io/deutschland-stack/transparenz-go:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: transparenz-go-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["/transparenz", "version"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["/transparenz", "version"]
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: transparenz-go
  namespace: transparenz-go
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: transparenz-go
