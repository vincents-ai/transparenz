name: SBOM-100

# Run weekly (Monday 03:00 UTC) and on manual dispatch.
# Cloning 100 repos is expensive — do not run on every push.
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      jobs:
        description: 'Parallel worker count'
        required: false
        default: '4'
      skip_large:
        description: 'Skip large repos (linux, llvm, pytorch, tensorflow, cockroachdb)'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: sbom-100
  cancel-in-progress: true

jobs:
  sbom-100:
    name: Generate SBOMs — 100 projects
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build transparenz
        run: make build

      - name: Free up disk space
        # Remove pre-installed toolchains that we don't need to maximise
        # available space for the 100 shallow clones.
        run: |
          sudo rm -rf \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/share/dotnet \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL \
            || true
          df -h /

      - name: Run SBOM-100 suite
        id: sbom100
        env:
          JOBS: ${{ github.event.inputs.jobs || '4' }}
          SKIP_LARGE: ${{ github.event.inputs.skip_large || 'true' }}
        run: |
          SKIP_FLAG=""
          if [[ "$SKIP_LARGE" == "true" ]]; then
            SKIP_FLAG="--skip-large"
          fi
          bash scripts/sbom-100-projects.sh \
            --binary ./build/transparenz \
            --output test-results/sbom-100 \
            --format cyclonedx \
            --jobs "$JOBS" \
            --shallow \
            $SKIP_FLAG

      - name: Print failure summary
        if: always()
        run: |
          TSV="test-results/sbom-100/results.tsv"
          if [[ -f "$TSV" ]]; then
            echo "### SBOM-100 Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            PASS=$(grep -c $'\tPASS\t' "$TSV" || true)
            FAIL=$(grep -c $'\tFAIL\t' "$TSV" || true)
            SKIP=$(grep -c $'\tSKIP\t' "$TSV" || true)
            echo "| Status | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| PASS   | $PASS |" >> "$GITHUB_STEP_SUMMARY"
            echo "| FAIL   | $FAIL |" >> "$GITHUB_STEP_SUMMARY"
            echo "| SKIP   | $SKIP |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [[ "$FAIL" -gt 0 ]]; then
              echo "#### Failed projects" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              grep $'\tFAIL\t' "$TSV" | awk -F'\t' '{printf "%-40s exit=%s  %s\n", $1, $3, $6}' >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-100-results-${{ github.run_number }}
          path: |
            test-results/sbom-100/results.tsv
            test-results/sbom-100/sboms/
            test-results/sbom-100/logs/
          retention-days: 30
