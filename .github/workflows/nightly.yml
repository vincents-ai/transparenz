name: Nightly Tests

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC every day
  workflow_dispatch: {}

jobs:
  full-test-suite:
    name: Full test suite (race + BDD + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: transparenz
          POSTGRES_PASSWORD: transparenz
          POSTGRES_DB: transparenz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests with race detector
        run: go test -race -timeout 120s -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Build binary for BDD
        run: go build -o transparenz .

      - name: Run BDD feature tests
        run: ./tests/run-bdd-tests.sh features/BSI_TR03183_*.feature
        env:
          TRANSPARENZ_BINARY: ./transparenz

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          flags: nightly

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-results
          path: test-results/
          retention-days: 30

  bsi-compliance-evidence:
    name: BSI TR-03183 compliance artifact
    runs-on: ubuntu-latest
    needs: [full-test-suite]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Build
        run: go build -o transparenz .

      - name: Generate self-SBOM
        run: ./transparenz generate --format cyclonedx-json --output transparenz-sbom.json .

      - name: Run BSI check
        run: ./transparenz bsi transparenz-sbom.json --output bsi-report.json || true

      - name: Upload BSI evidence
        uses: actions/upload-artifact@v4
        with:
          name: bsi-compliance-evidence-${{ github.sha }}
          path: |
            transparenz-sbom.json
            bsi-report.json
          retention-days: 90
