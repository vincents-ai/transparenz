stages:
  - test
  - build

variables:
  GOLANG_VERSION: "1.21"
  CGO_ENABLED: "0"

.go-cache:
  &go-cache
  before_script:
    - go version
    - go mod download
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/go-build
      - vendor/

test:
  <<: *go-cache
  stage: test
  image: golang:${GOLANG_VERSION}-alpine
  script:
    - go test -v -race -cover ./...
    - go test -v ./tests/... -tags=bdd

lint:
  stage: test
  image: golang:${GOLANG_VERSION}
  before_script:
    - go install golang.org/dl/golang${GOLANG_VERSION}@latest
    - go${GOLANG_VERSION} download
  script:
    - go vet ./...
    - go fmt ./...

bsi-compliance-tests:
  <<: *go-cache
  stage: test
  image: golang:${GOLANG_VERSION}
  script:
    - go build -o transparenz ./cmd/transparenz
    - ./tests/run-bdd-tests.sh features/BSI_TR03183_*.feature
  artifacts:
    reports:
      junit: test-results.xml
    paths:
      - test-results.xml
      - bsi-report.json

build:
  <<: *go-cache
  stage: build
  image: golang:${GOLANG_VERSION}-alpine
  script:
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o transparenz-linux-amd64 ./cmd/transparenz
    - CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o transparenz-darwin-amd64 ./cmd/transparenz
    - CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o transparenz-darwin-arm64 ./cmd/transparenz
  artifacts:
    paths:
      - transparenz-*
    expire_in: 1 week

build-binary:
  stage: build
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - curl -sL https://github.com/deutschland-stack/transparenz/releases/latest/download/transparenz-linux-amd64 -o transparenz
    - chmod +x transparenz
  rules:
    - if: $CI_COMMIT_TAG
  artifacts:
    paths:
      - transparenz
    expire_in: 1 week
